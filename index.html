<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMandi Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="form-title">Login to eMandi</h2>
        <form action="https://api-new-5t5g.onrender.com/api/v1/user" method="POST">
            <input type="text" name="name" placeholder="Enter name" required />
            <input type="email" name="email" placeholder="Enter email" required />
            <input type="password" name="password" placeholder="Enter password" required />
            <input type="text" name="phone" placeholder="Enter mobile number" required />
  
  <button type="submit">Register</button>
        </form>
        <div class="toggle" id="toggle-text">
            Don't have an account? <span onclick="toggleForm()">Register</span>
        </div>
    </div>

    <script src="code.js"></script>
</body>
</html>
