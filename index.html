<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration</title>
</head>
<body>

  <h2>Register User</h2>
  <form id="userForm">
  <input type="text" name="name" placeholder="Full Name" required>
  <input type="email" name="email" placeholder="Email Address" required>
  <input type="password" name="password" placeholder="Password" required>
  <input type="number" name="phone" placeholder="Phone Number" required>
  
  <button type="submit">Register User</button>
</form>

  <script>
    const form = document.getElementById('userForm');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  
  // Create the object and cast the phone field to a Number
  const payload = {
    name: formData.get('name'),
    email: formData.get('email'),
    password: formData.get('password'),
    phone: Number(formData.get('phone')) // Ensure this is a numeric type
  };

  try {
    const response = await fetch('https://api-new-5t5g.onrender.com/api/v1/user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if(response.ok){
      window.location.href = "sindex.html";
    }

    const result = await response.json();
    console.log("Server response:", result);
  } catch (err) {
    console.error("Submission failed:", err);
  }
});
  </script>

</body>
</html>
